# Zonas de rate limiting (contexto http)
limit_req_zone $binary_remote_addr zone=general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=submit:10m  rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

server_tokens off;

upstream next_app {
  server app:3000;
}

server {
  listen 80;
  server_name reclamosroatan.cree.gob.hn www.reclamosroatan.cree.gob.hn;

  location = /healthz {
    access_log off;
    return 200 "ok\n";
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name reclamosroatan.cree.gob.hn www.reclamosroatan.cree.gob.hn;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  client_max_body_size 30m;

  # Timeouts anti-Slowloris
  client_body_timeout    10s;
  client_header_timeout  10s;
  keepalive_timeout      30s;
  send_timeout           10s;

  # Límite de conexiones simultáneas por IP
  limit_conn     conn_per_ip 20;
  limit_conn_status 429;
  limit_req_status  429;

  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
  add_header X-Frame-Options "DENY" always;

  # Endpoint de envío de reclamos: límite estricto (10/min, ráfaga de 5)
  location = /api/public/submissions {
    limit_req zone=submit burst=5 nodelay;
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  # Todo lo demás: límite general (60/min, ráfaga de 30)
  location / {
    limit_req zone=general burst=30 nodelay;
    proxy_pass http://next_app;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
  }
}
